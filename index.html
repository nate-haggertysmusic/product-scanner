<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
  padding:16px;
  margin:0;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

button{
  width:100%;
  border:none;
  border-radius:10px;
  padding:12px;
  font-size:18px;
  font-weight:bold;
  background:#1a73e8;
  color:white;
}

#scannerBox{
  margin-top:20px;
}

#scannerMessage{
  text-align:center;
  color:#aaa;
  margin-top:12px;
  font-size:16px;
}

.card{
  background:#222;
  border-radius:12px;
  padding:16px;
  margin-top:20px;
  display:none;
}

.info-label{
  color:#aaa;
  font-size:14px;
  margin-top:10px;
}

.info-value{
  font-size:22px;
  font-weight:bold;
}

#serialDisplay,
#price{
  font-size:20px;
}

label{
  display:block;
  margin-top:10px;
  font-weight:bold;
}

select,
input,
textarea{
  width:100%;
  margin-top:6px;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:16px;
  box-sizing:border-box;
}

.checkbox-row{
  display:flex;
  gap:14px;
  margin-top:18px;
}

.checkbox-card{
  flex:1;
  background:#222;
  border-radius:10px;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:16px;
}

.checkbox-card input{
  width:20px;
  height:20px;
}

#message{
  margin-top:20px;
  text-align:center;
  font-size:18px;
  color:#9fd0ff;
  font-weight:bold;
  white-space:pre-wrap;
}

.submit-button{
  margin-top:26px;
  margin-bottom:40px;
}

.rescan-button{
  margin-top:20px;
  background:#444;
}

#scanProductButton{
  width:90%;
  max-width:360px;
}

#statusOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#statusBox{
  background:#222;
  color:white;
  border-radius:18px;
  padding:28px 34px;
  font-size:26px;
  font-weight:bold;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

#reader{
  width:100%;
  height:180px;
  overflow:hidden;
  border-radius:12px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}

#reader video{
  width:100% !important;
  height:100% !important;
  object-fit:cover !important;
  border-radius:12px;
}

#reader__scan_region{
  display:flex !important;
  align-items:center;
  justify-content:center;
}

#reader img{
  display:none !important;
}

</style>
</head>

<body>

<h1>Product Scanner</h1>

<div id="scannerBox">
  <div id="reader">
    <button id="scanProductButton" onclick="resetAndStartScanner()">
      Scan Product
    </button>
  </div>
  <div id="scannerMessage">Tap Scan Product when ready.</div>
</div>

<div class="card" id="productCard">
  <div class="info-label">Product</div>
  <div class="info-value" id="productName"></div>

  <div class="info-label">Serial Number</div>
  <div id="serialDisplay"></div>

  <div class="info-label">Price</div>
  <div id="price"></div>

  <button class="rescan-button" onclick="resetAndStartScanner()">
    Re-Scan
  </button>
</div>

<label>Photographer</label>
<select id="photographer">
  <option value="">Select Photographer</option>
  <option value="Nate">Nate</option>
  <option value="Amber">Amber</option>
  <option value="Taylor">Taylor</option>
  <option value="Mia">Mia</option>
  <option value="Saylor">Saylor</option>
</select>

<div class="checkbox-row">
  <label class="checkbox-card">
    <input type="checkbox" id="hasCase">
    Case
  </label>

  <label class="checkbox-card">
    <input type="checkbox" id="socials">
    Socials
  </label>
</div>

<label>Notes / Damage</label>
<input id="notes" type="text" placeholder="Damage notes, missing parts, etc.">

<label class="checkbox-card" style="margin-top:20px;">
  <input type="checkbox" id="derekOffice" onchange="handleDerekOffice()">
  In Derek's office, no photos taken
</label>

<button class="submit-button" onclick="submitProduct()">
Submit
</button>

<div id="statusOverlay">
  <div id="statusBox">Submitting...</div>
</div>

<script>
const APPS_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbx9_ZUXtHrmXSWH3ih4fifT3MY0eYsFkLHVjQOVl0uCKM2AWgBaIfYymMJ4PRfQE5ZQ/exec";

let scanner = null;
let currentProduct = null;
let scannerRunning = false;
let lookupCache = {};
let lookupLoaded = false;

function setMessage(text){
  showReaderMessage(text);
}

function setScannerMessage(text){
  document.getElementById("scannerMessage").textContent = text;
}

function showScannerBox(){
  document.getElementById("scannerBox").style.display = "block";
}

function hideScannerBox(){
  document.getElementById("scannerBox").style.display = "none";
}

function showProductCard(){
  document.getElementById("productCard").style.display = "block";
}

function hideProductCard(){
  document.getElementById("productCard").style.display = "none";
}

function showScanProductButton(){
  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <button id="scanProductButton" onclick="resetAndStartScanner()">
      Scan Product
    </button>
  `;
}

function showReaderMessage(text){
  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <div style="color:#aaa;font-size:20px;font-weight:bold;text-align:center;padding:20px;">
      ${text}
    </div>
  `;
}

function showProductInReader(product){
  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <div style="width:100%;padding:14px;box-sizing:border-box;text-align:center;">
      <div style="font-size:18px;font-weight:bold;margin-bottom:12px;">
        ${product.productName}
      </div>

      <div style="display:flex;justify-content:center;gap:18px;font-size:16px;">
        <div>
          <span style="color:#aaa;">Serial:</span>
          <strong>${product.serial}</strong>
        </div>

        <div>
          <span style="color:#aaa;">Price:</span>
          <strong>${product.price ? "$" + product.price : ""}</strong>
        </div>
      </div>
    </div>
  `;
}

function hideScanProductButton(){
  const button = document.getElementById("scanProductButton");

  if(button){
    button.style.display = "none";
  }
}

function cleanScannedSerial(serial){
  return String(serial || "")
    .trim()
    .replace(/\*/g, "")
    .replace(/\s+/g, "");
}

async function stopScanner(){
  if(scanner){
    try{
      if(scannerRunning){
        await scanner.stop();
      }
    }catch(e){}

    try{
      await scanner.clear();
    }catch(e){}
  }

  scanner = null;
  scannerRunning = false;
}

async function startScanner(){
  showReaderMessage("");
  setScannerMessage("Opening camera...");
  showScannerBox();
  hideProductCard();
  hideScanProductButton();

  if(scanner){
  await stopScanner();
}

  document.getElementById("reader").innerHTML = "";

  scanner = new Html5Qrcode("reader", {
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E
    ]
  });

  scanner.start(
  {
  deviceId: {
    exact: "20D1AAF3B115C7500C4207E6ACBC9415797233C4"
  }
},
    
  {
    fps:20,
    qrbox:function(viewfinderWidth, viewfinderHeight){
      return {
        width:viewfinderWidth,
        height:viewfinderHeight
      };
    },
    aspectRatio:2.2
  },
  async(decodedText)=>{
      await stopScanner();

      document.getElementById("reader").innerHTML = "";
      setScannerMessage("Barcode scanned.");
      lookupProduct(cleanScannedSerial(decodedText));
    },
    ()=>{}
  ).then(()=>{
    scannerRunning = true;
    setScannerMessage("Point camera at serial number barcode");
  }).catch(err=>{
    scannerRunning = false;
    setScannerMessage("Camera error. Tap Re-Scan or refresh the page.");
    setMessage("Camera error: " + err);
  });
}

function resetFormOnly(){
  currentProduct = null;

  hideProductCard();

  document.getElementById("hasCase").checked = false;
  document.getElementById("socials").checked = false;
  document.getElementById("derekOffice").checked = false;
  document.getElementById("notes").value = "";

  document.getElementById("productName").textContent = "";
  document.getElementById("serialDisplay").textContent = "";
  document.getElementById("price").textContent = "";

  showReaderMessage("");
}

async function resetAndStartScanner(){
  await stopScanner();
  resetFormOnly();
  startScanner();
}

function apiRequest(payload){
  return new Promise((resolve, reject) => {
    const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

    window[callbackName] = function(data){
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    const params = new URLSearchParams();

    Object.keys(payload).forEach(key => {
      params.append(key, payload[key]);
    });

    params.append("callback", callbackName);

    const script = document.createElement("script");
    script.src = APPS_SCRIPT_URL + "?" + params.toString();

    script.onerror = function(){
      delete window[callbackName];
      script.remove();
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}

async function lookupProduct(serial){
  serial = cleanScannedSerial(serial).toLowerCase();

  if(!lookupLoaded){
    setMessage("Product list still loading. Trying lookup...");
    await loadLookupData();
  }

  const product = lookupCache[serial];

  if(!product){
    currentProduct = null;
    hideProductCard();
    showScannerBox();
    setMessage("Product not found for scanned serial: " + serial);

    setTimeout(() => {
      startScanner();
    }, 2000);

    return;
  }

  currentProduct = product;

    showScannerBox();
    hideProductCard();
    showProductInReader(product);
    setScannerMessage("Review product info, then Submit or Re-Scan.");
  }

function handleDerekOffice(){
  const checked = document.getElementById("derekOffice").checked;
  const notes = document.getElementById("notes");
  const text = "In Derek's office, no photos taken";

  if(checked && !notes.value.includes(text)){
    notes.value = notes.value.trim()
      ? notes.value + "\n" + text
      : text;
  }
}

async function submitProduct(){
  if(!currentProduct){
    setMessage("Scan a product first.");
    return;
  }

  const photographer = document.getElementById("photographer").value;

  if(!photographer){
    setMessage("Select photographer.");
    return;
  }

  const payload = {
    action:"submit",
    photographer:photographer,
    serial:currentProduct.serial,
    productName:currentProduct.productName,
    price:currentProduct.price,
    hasCase:document.getElementById("hasCase").checked,
    socials:document.getElementById("socials").checked,
    notes:document.getElementById("notes").value,
    derekOffice:document.getElementById("derekOffice").checked
  };

  const overlay = document.getElementById("statusOverlay");
  const statusBox = document.getElementById("statusBox");

  showReaderMessage("");
  statusBox.textContent = "Submitting...";
  overlay.style.display = "flex";

  try{
    const result = await apiRequest(payload);

    if(!result.success){
      overlay.style.display = "none";
      setMessage(result.message || "Submit failed.");
      return;
    }

    statusBox.textContent = "Submitted Successfully";

setTimeout(() => {
  overlay.style.display = "none";
  resetFormOnly();
  hideProductCard();
  showScannerBox();
  showScanProductButton();
  setScannerMessage("Tap Scan Product when ready.");
}, 3000);

  }catch(err){
    overlay.style.display = "none";
    setMessage("Submit failed: " + err.message);
  }
}

async function loadLookupData(){
  setMessage("Loading Product List...");

  try{
    const data = await apiRequest({
      action:"lookupData"
    });

    if(data.success && data.products){
      lookupCache = data.products;
      lookupLoaded = true;
      showReaderMessage("");
    }else{
      lookupLoaded = false;
      setMessage(data.message || "Could not load product list.");
    }
  }catch(err){
    lookupLoaded = false;
    setMessage("Lookup data failed to load: " + err.message);
  }
}

window.addEventListener("load", async () => {
  showScannerBox();
  hideProductCard();
  showReaderMessage("Loading Product List...");
  setScannerMessage("");
  await loadLookupData();
  showScanProductButton();
  setScannerMessage("Tap Scan Product when ready.");
});
</script>

</body>
</html>
