<body>

<div id="photographerSelectScreen" style="display:none;">
  <h1 style="margin-top:0;margin-bottom:18px;">
    Product Scanner V46
  </h1>

  <img src="haggertys-logo.png" class="start-logo">

  <button class="photographer-button" onclick="selectPhotographer('Nate')">Nate</button>
  <button class="photographer-button" onclick="selectPhotographer('Amber')">Amber</button>

  <button class="photographer-button" onclick="selectPhotographer('Alex')">Alex</button>
</div>

<div id="mainApp">

<div class="top-bar">
  <button class="back-button" onclick="showPhotographerSelection()">Back</button>
  <h1 id="pageTitle"></h1>
  <button class="submitted-button" onclick="showSubmittedPage()">Submitted</button>

  <div id="scannerMessage"></div>

    <option value="">Select Photographer</option>

    <option value="Alex">Alex</option>
  </select>
</div>

<div class="checkbox-row" id="checkboxRow">
  <label class="checkbox-card" id="cutoutCard" style="display:none;">
    <input type="checkbox" id="cutout">
    Cutout
  </label>
  
  <label class="checkbox-card">
    <input type="checkbox" id="hasCase">
    Case
  </label>

  <label class="checkbox-card">
    <input type="checkbox" id="socials">
    Socials
  </label>

  Notes / Damage
</label>

  <div id="submittedList"></div>

</div>

  <div id="statusBox">Submitting...</div>
</div>

<div id="confirmOverlay">
  <div id="confirmBox"></div>
</div>

<script>
const APPS_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbx9_ZUXtHrmXSWH3ih4fifT3MY0eYsFkLHVjQOVl0uCKM2AWgBaIfYymMJ4PRfQE5ZQ/exec";

let pendingProduct = null;
let pendingBarcode = "";
let ignoredBarcodes = new Set();
let candidateBarcode = "";
let candidateCount = 0;
let scanner = null;
let scannerRunning = false;
let videoStream = null;
let zxingReader = null;
let scanLoopActive = false;
let currentProduct = null;
let lookupCache = {};
let lookupLoaded = false;
let detectedBarcodes = new Set();
let barcodeProcessing = false;
let submittingAnimation = null;
let loadingAnimation = null;
let productEntryMode = "scan";
let selectedPhotographer = "";
let submittedProductsCache = [];

function setMessage(text){
  showReaderMessage(text);
}

function setScannerMessage(text){
  document.getElementById("scannerMessage").textContent = text;
}

function showScannerBox(){
  document.getElementById("scannerBox").style.display = "block";
}

function hideScannerBox(){
  document.getElementById("scannerBox").style.display = "none";
}

function showProductCard(){
  document.getElementById("productCard").style.display = "block";
}

function hideProductCard(){
  document.getElementById("productCard").style.display = "none";
}

function getTodayKey(){
  const now = new Date();
  return now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();
}

function getSavedPhotographer(){
  const savedName = localStorage.getItem("selectedPhotographer");
  const savedDate = localStorage.getItem("selectedPhotographerDate");

  if(savedName && savedDate === getTodayKey()){
    return savedName;
  }

  localStorage.removeItem("selectedPhotographer");
  localStorage.removeItem("selectedPhotographerDate");
  clearScanPageState();
  return "";
}
  
function updateSubmitButtonState(){
  const submitButton = document.getElementById("submitButton");

  if(!submitButton) return;

  if(currentProduct){
    submitButton.classList.remove("inactive");
  }else{
    submitButton.classList.add("inactive");
  }
}

function saveScanPageState(){
  if(!selectedPhotographer || !currentProduct) return;

  const state = {
    date: getTodayKey(),
    photographer: selectedPhotographer,
    product: currentProduct,
    hasCase: document.getElementById("hasCase").checked,
    socials: document.getElementById("socials").checked,
    cutout: document.getElementById("cutout").checked,
    derekOffice: document.getElementById("derekOffice").checked,
    notes: document.getElementById("notes").value
  };

  localStorage.setItem("scanPageState", JSON.stringify(state));
}

function clearScanPageState(){
  localStorage.removeItem("scanPageState");
}

function restoreScanPageState(){
  const rawState = localStorage.getItem("scanPageState");

  if(!rawState) return false;

  let state;

  try{
    state = JSON.parse(rawState);
  }catch(e){
    clearScanPageState();
    return false;
  }

  if(
    !state ||
    state.date !== getTodayKey() ||
    state.photographer !== selectedPhotographer ||
    !state.product
  ){
    clearScanPageState();
    return false;
  }

  currentProduct = state.product;

  document.getElementById("hasCase").checked = !!state.hasCase;
  document.getElementById("socials").checked = !!state.socials;
  document.getElementById("derekOffice").checked = !!state.derekOffice;
  document.getElementById("notes").value = state.notes || "";

  updateCutoutOption(currentProduct);

  document.getElementById("cutout").checked =
    !!state.cutout && productNeedsCutout(currentProduct);

  showScannerBox();
  hideProductCard();
  showProductInReader(currentProduct);
  setScannerMessage("");
  updateSubmitButtonState();

  return true;
}

async function showPhotographerSelection(){
  await stopScanner();

  currentProduct = null;
  selectedPhotographer = "";

  resetFormOnly();
  hideProductCard();
  setScannerMessage("");

  clearScanPageState();

  localStorage.removeItem("selectedPhotographer");
  localStorage.removeItem("selectedPhotographerDate");

  document.getElementById("photographerSelectScreen").style.display = "block";
  document.getElementById("mainApp").style.display = "none";
  document.getElementById("pageTitle").style.display = "none";
}
  
function selectPhotographer(name){
  selectedPhotographer = name;
  localStorage.setItem("selectedPhotographer", name);
  localStorage.setItem("selectedPhotographerDate", getTodayKey());

  document.getElementById("photographerSelectScreen").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  document.getElementById("pageTitle").style.display = "block";
  document.getElementById("pageTitle").textContent = name;

  document.querySelector(".photographer-row").style.display = "none";

  showScannerBox();

  if(lookupLoaded){
    showScanProductButton();
    setScannerMessage("");
  }else{
    showReaderMessage("Loading");
    setScannerMessage("");
  }

  updateSubmitButtonState();
}

function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

async function showSubmittedPage(){
  await stopScanner();

  saveScanPageState();

  if(!currentProduct){
    hideProductCard();
    showScannerBox();
    showScanProductButton();
    updateSubmitButtonState();
  }

  document.getElementById("photographerSelectScreen").style.display = "none";
  document.getElementById("mainApp").style.display = "none";
  document.getElementById("submittedPage").style.display = "block";

  document.getElementById("submittedPageTitle").textContent =
    selectedPhotographer ? selectedPhotographer + "'s Submitted" : "Submitted";

  loadSubmittedProducts();
}

function showScanPage(){
  document.getElementById("submittedPage").style.display = "none";
  document.getElementById("photographerSelectScreen").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  document.getElementById("pageTitle").style.display = "block";
  document.getElementById("pageTitle").textContent = selectedPhotographer;

  document.querySelector(".photographer-row").style.display = "none";

  showScannerBox();
  hideProductCard();

  if(currentProduct){
    showProductInReader(currentProduct);
  }else{
    showScanProductButton();
  }

  setScannerMessage("");
  updateSubmitButtonState();
}

async function loadSubmittedProducts(){
  const status = document.getElementById("submittedStatus");
  const list = document.getElementById("submittedList");

  submittedProductsCache = [];
  list.innerHTML = "";

  if(!selectedPhotographer){
    status.textContent = "No photographer selected.";
    return;
  }

  status.textContent = "Loading submitted products...";

  try{
    const result = await apiRequest({
      action:"getSubmittedToday",
      photographer:selectedPhotographer
    });

    if(!result.success){
      status.textContent = result.message || "Could not load submitted products.";
      return;
    }

    submittedProductsCache = result.products || [];

    if(submittedProductsCache.length === 0){
      status.textContent = "No products submitted today.";
      return;
    }

    status.textContent = "";
    renderSubmittedProducts();

  }catch(err){
    status.textContent = "Could not load submitted products: " + err.message;
  }
}

function renderSubmittedProducts(){
  const list = document.getElementById("submittedList");

  list.innerHTML = "";

  submittedProductsCache.forEach((product, index) => {
    const card = document.createElement("div");
    card.className = "submitted-card";

    card.innerHTML = `
      <div class="submitted-product-name">
        ${escapeHtml(product.productName)}
      </div>

      <div class="submitted-serial">
        S/N: ${escapeHtml(product.serial)}
      </div>

      <div class="submitted-checkbox-row">
        <label class="submitted-checkbox-card">
          <input type="checkbox" id="submittedCase_${index}" ${product.hasCase ? "checked" : ""}>
          Case
        </label>

        <label class="submitted-checkbox-card">
          <input type="checkbox" id="submittedSocials_${index}" ${product.socials ? "checked" : ""}>
          Socials
        </label>

        <label class="submitted-checkbox-card">
          <input type="checkbox" id="submittedCutout_${index}" ${product.cutout ? "checked" : ""}>
          Cutout
        </label>
      </div>

      <label class="submitted-notes-label">
        Notes / Damage
      </label>

      <input
        id="submittedNotes_${index}"
        type="text"
        value="${escapeHtml(product.notes)}"
        placeholder="Damage notes, missing parts, etc..."
      >

      <button
        id="submittedSave_${index}"
        class="submitted-save-button"
        onclick="saveSubmittedProduct(${index})"
      >
        Save
      </button>

      <div id="submittedMessage_${index}" class="submitted-row-message"></div>
    `;

    list.appendChild(card);
  });
}

async function saveSubmittedProduct(index){
  const product = submittedProductsCache[index];

  if(!product) return;

  const saveButton = document.getElementById("submittedSave_" + index);
  const message = document.getElementById("submittedMessage_" + index);

  const hasCase = document.getElementById("submittedCase_" + index).checked;
  const socials = document.getElementById("submittedSocials_" + index).checked;
  const cutout = document.getElementById("submittedCutout_" + index).checked;
  const notes = document.getElementById("submittedNotes_" + index).value;

  saveButton.disabled = true;
  saveButton.style.background = "#777";
  message.textContent = "Saving...";

  try{
    const result = await apiRequest({
      action:"updateSubmittedProduct",
      sheetName:product.sheetName,
      rowNumber:product.rowNumber,
      photographer:selectedPhotographer,
      serial:product.serial,
      hasCase:hasCase,
      socials:socials,
      cutout:cutout,
      notes:notes
    });

    if(!result.success){
      message.textContent = result.message || "Save failed.";
      saveButton.disabled = false;
      saveButton.style.background = "#1a73e8";
      return;
    }

    if(result.product){
      submittedProductsCache[index] = result.product;

      if(
        currentProduct &&
        cleanScannedSerial(currentProduct.serial) === cleanScannedSerial(result.product.serial)
      ){
        document.getElementById("hasCase").checked = !!result.product.hasCase;
        document.getElementById("socials").checked = !!result.product.socials;
        document.getElementById("notes").value = result.product.notes || "";

        updateCutoutOption(currentProduct);

        const cutoutBox = document.getElementById("cutout");
        if(cutoutBox){
          cutoutBox.checked = !!result.product.cutout && productNeedsCutout(currentProduct);
        }

        saveScanPageState();
      }
    }

    message.textContent = "Saved";

    setTimeout(() => {
      message.textContent = "";
    }, 1800);

  }catch(err){
    message.textContent = "Save failed: " + err.message;
  }

  saveButton.disabled = false;
  saveButton.style.background = "#1a73e8";
}

function cancelManualEntry(){

async function handleManualSerialInput(){
  const input = document.getElementById("manualSerialInput");
  const message = document.getElementById("manualSerialMessage");

  if(!input) return;

  const typed = cleanScannedSerial(input.value);

  if(!typed){
    if(message) message.textContent = "Product will appear when only one match is found.";
    return;
  }

  const matches = Object.keys(lookupCache).filter(serial => {
    return serial.includes(typed);
  });

  if(matches.length === 1){
    const matchedSerial = matches[0];
    const matchedProduct = lookupCache[matchedSerial];

    pendingProduct = matchedProduct;
    pendingBarcode = matchedSerial;

  showPendingProductInReader(
    matchedProduct,
    matchedSerial,
    String(matchedProduct.submitted || "").trim() !== ""
  );

    setScannerMessage("");
    return;
  }

  if(message){
    if(matches.length === 0){
      message.textContent = "No matching products.";
    }else{
      message.textContent = matches.length + " possible matches. Keep typing.";
    }
  }
}

function cleanScannedSerial(serial){
  let cleaned = String(serial || "")
    .trim()
    .replace(/\*/g, "")
    .replace(/\s+/g, "")
    .toLowerCase();

  if(cleaned.startsWith("m")){
    cleaned = cleaned.substring(1);
  }

  return cleaned;
}

async function stopScanner(){
  scanLoopActive = false;

  if(videoStream){

  try{
  await setTorch(false);

}

  videoStream = null;
  zxingReader = null;

async function setTorch(enabled){
  try{
    if(!videoStream) return;

    const track = videoStream.getVideoTracks()[0];

    if(!track) return;

    const capabilities = track.getCapabilities();

    if(!capabilities.torch) return;

    await track.applyConstraints({
      advanced: [{ torch: enabled }]
    });

  }catch(err){
    console.log("Torch error:", err);
  }
}

async function optimizeCameraForBarcode(){
  try{
    if(!videoStream) return;

    const track = videoStream.getVideoTracks()[0];
    if(!track || !track.getCapabilities) return;

    const capabilities = track.getCapabilities();
    const advanced = [];

    if(capabilities.focusMode && capabilities.focusMode.includes("continuous")){
      advanced.push({ focusMode: "continuous" });
    }

    if(capabilities.zoom){
      const zoom = Math.min(
        capabilities.zoom.max,
        Math.max(capabilities.zoom.min, 2)
      );

      advanced.push({ zoom: zoom });
    }

    if(capabilities.exposureMode && capabilities.exposureMode.includes("continuous")){
      advanced.push({ exposureMode: "continuous" });
    }

    if(advanced.length){
      await track.applyConstraints({ advanced: advanced });
    }

  }catch(err){
    console.log("Camera optimization error:", err);
  }
}

async function startScanner(){
  showReaderMessage("");
  setScannerMessage("Opening camera...");
  showScannerBox();
  hideProductCard();
  hideScanProductButton();

  await stopScanner();

  detectedBarcodes.clear();
  barcodeProcessing = false;
  pendingProduct = null;
  pendingBarcode = "";
  candidateBarcode = "";
  candidateCount = 0;
  scanLoopActive = true;
  productEntryMode = "scan";

  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <video id="video" autoplay playsinline></video>
    <canvas id="scanCanvas" style="display:none;"></canvas>
  `;

  const video = document.getElementById("video");
  const canvas = document.getElementById("scanCanvas");

  try{
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30 }
      },
      audio: false
    });

    video.srcObject = videoStream;

    await video.play();

    await setTorch(true);
    await optimizeCameraForBarcode();

    scannerRunning = true;
    showCancelScanButton();
    
    zxingReader = new ZXingBrowser.BrowserMultiFormatReader(undefined, {
      delayBetweenScanAttempts: 0
    });

    setScannerMessage("Point serial barcode inside the scan window");

    scanCroppedFrame(video, canvas);

  }catch(err){
    scannerRunning = false;
    setScannerMessage("Camera error. Tap Re-Scan or refresh the page.");
    setMessage("Camera error: " + err.message);
  }
}

async function scanCroppedFrame(video, canvas){
  if(!scanLoopActive || barcodeProcessing){
    return;
  }

  if(video.readyState < 2){
    requestAnimationFrame(() => scanCroppedFrame(video, canvas));
    return;
  }

  const sourceWidth = video.videoWidth;
  const sourceHeight = video.videoHeight;

  const cropWidth = Math.floor(sourceWidth * 0.90);
  const cropHeight = Math.floor(sourceHeight * 0.45);

  const cropX = Math.floor((sourceWidth - cropWidth) / 2);
  const cropY = Math.floor((sourceHeight - cropHeight) / 2);

  canvas.width = cropWidth;
  canvas.height = cropHeight;

  const ctx = canvas.getContext("2d");

  ctx.drawImage(
    video,
    cropX,
    cropY,
    cropWidth,
    cropHeight,
    0,
    0,
    cropWidth,
    cropHeight
  );

try{
  const result = await zxingReader.decodeFromCanvas(canvas);
  const cleaned = cleanScannedSerial(result.getText());

  if(!lookupCache[cleaned]){
  throw new Error("No matching product");
}

  barcodeProcessing = true;

const matchedProduct = lookupCache[cleaned];

await stopScanner();

pendingProduct = matchedProduct;
pendingBarcode = cleaned;

showPendingProductInReader(
  matchedProduct,
  cleaned,
  String(matchedProduct.submitted || "").trim() !== ""
);
  setScannerMessage("Confirm product or Re-Scan.");
  return;

}catch(e){}

setTimeout(() => {
  scanCroppedFrame(video, canvas);
}, 40);
}

function apiRequest(payload){
  return new Promise((resolve, reject) => {
    const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

    window[callbackName] = function(data){
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    const params = new URLSearchParams();

    Object.keys(payload).forEach(key => {
      params.append(key, payload[key]);
    });

    params.append("callback", callbackName);

    const script = document.createElement("script");
    script.src = APPS_SCRIPT_URL + "?" + params.toString();

    script.onerror = function(){
      delete window[callbackName];
      script.remove();
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}

  if(!product){
    currentProduct = null;
    hideProductCard();
    showScannerBox();
    setMessage("Product not found for scanned serial: " + serial);

    setTimeout(() => {
      startScanner();
    }, 2000);

    return;
  }

  currentProduct = product;

    showScannerBox();
    hideProductCard();
    showProductInReader(product);
    setScannerMessage("");
  }

    return;
  }

  const payload = {
    action:"submit",
    photographer:photographer,
    serial:currentProduct.serial,
    productName:currentProduct.productName,
    price:currentProduct.price,
    hasCase:document.getElementById("hasCase").checked,
    socials:document.getElementById("socials").checked,
    notes:document.getElementById("notes").value,
    derekOffice:document.getElementById("derekOffice").checked,
    cutout:document.getElementById("cutout").checked
  };

  const overlay = document.getElementById("statusOverlay");
  const statusBox = document.getElementById("statusBox");

  const submitButton = document.getElementById("submitButton");
  submitButton.disabled = true;
  submitButton.style.background = "#777";
  submitButton.style.opacity = "0.5";

  showReaderMessage("");
  let dots = 0;

  statusBox.textContent = "Submitting";

  submittingAnimation = setInterval(() => {
    dots = (dots + 1) % 4;
    statusBox.textContent = "Submitting" + ".".repeat(dots);
  }, 300);
  overlay.style.display = "flex";

  try{
    const result = await apiRequest(payload);

    if(!result.success){

      if(submittingAnimation){
        clearInterval(submittingAnimation);
        submittingAnimation = null;
      }

      overlay.style.display = "none";

      submitButton.disabled = false;
      submitButton.style.background = "#1a73e8";
      submitButton.style.opacity = "1";

      setMessage(result.message || "Submit failed.");
      return;
    }

    if(submittingAnimation){
      clearInterval(submittingAnimation);
      submittingAnimation = null;
    }

    statusBox.textContent = "Submitted\nSuccessfully";

  const normalizedSerial = cleanScannedSerial(currentProduct.serial);

  if(lookupCache[normalizedSerial]){
  lookupCache[normalizedSerial].submitted = "Submitted";
  }

setTimeout(() => {
  overlay.style.display = "none";

  submitButton.disabled = false;
  submitButton.style.background = "";
  submitButton.style.opacity = "";

  clearScanPageState();

  resetFormOnly();
  hideProductCard();

}

async function loadLookupData(){
  try{
    const data = await apiRequest({
      action:"lookupData"
    });

    if(data.success && data.products){
      if(loadingAnimation){
        clearInterval(loadingAnimation);
        loadingAnimation = null;
      }
      lookupCache = data.products;
      lookupLoaded = true;

      if(selectedPhotographer){
        showScanProductButton();
        setScannerMessage("");
      }else{
        showReaderMessage("");
      }
    }else{
      if(loadingAnimation){
        clearInterval(loadingAnimation);
        loadingAnimation = null;
      }
      lookupLoaded = false;
      setMessage(data.message || "Could not load product list.");
    }
  }catch(err){
    if(loadingAnimation){
      clearInterval(loadingAnimation);
      loadingAnimation = null;
    }
    lookupLoaded = false;
    setMessage("Lookup data failed to load: " + err.message);
  }
}
