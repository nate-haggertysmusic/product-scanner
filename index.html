<script>
const APPS_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbx9_ZUXtHrmXSWH3ih4fifT3MY0eYsFkLHVjQOVl0uCKM2AWgBaIfYymMJ4PRfQE5ZQ/exec";

let pendingProduct = null;
let pendingBarcode = "";
let ignoredBarcodes = new Set();
let candidateBarcode = "";
let candidateCount = 0;
let scanner = null;
let scannerRunning = false;
let videoStream = null;
let zxingReader = null;
let scanLoopActive = false;
let currentProduct = null;
let lookupCache = {};
let lookupLoaded = false;
let detectedBarcodes = new Set();
let barcodeProcessing = false;
let submittingAnimation = null;
let loadingAnimation = null;
let productEntryMode = "scan";

}

function showProductCard(){

}

}

  `;
}

function cancelManualEntry(){

  showScannerBox();
  showScanProductButton();
  setScannerMessage("");
}

function cancelProductSelection(){
  resetFormOnly();
  showScannerBox();
  showScanProductButton();

}

function showCancelScanButton(){
  const reader = document.getElementById("reader");

  const controlStrip = document.createElement("div");
  controlStrip.style.position = "absolute";
  controlStrip.style.left = "0";
  controlStrip.style.right = "0";
  controlStrip.style.bottom = "0";
  controlStrip.style.height = "74px";

  buttonWrap.style.display = "flex";

  manualButton.style.background = "#1a73e8";

  const cancelButton = document.createElement("button");
  cancelButton.textContent = "Cancel Scan";
  cancelButton.style.background = "#444";
  cancelButton.onclick = cancelScan;
  cancelButton.style.fontSize = "14px";
  cancelButton.style.padding = "8px";

  controlStrip.appendChild(buttonWrap);

async function showManualSerialEntry(){
  await stopScanner();

  productEntryMode = "manual";

  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <div style="
      width:100%;
      padding:14px;
      box-sizing:border-box;
      text-align:center;
    ">
      <div style="font-size:18px;font-weight:bold;margin-bottom:10px;">
        Enter Serial Number
      </div>

      <input
        id="manualSerialInput"
        type="text"
        placeholder="Start typing serial..."
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        style="text-align:center;font-size:20px;"
        oninput="handleManualSerialInput()"
      >

      <div id="manualSerialMessage" style="margin-top:10px;color:#aaa;font-size:14px;">
        Product will appear when only one match is found.
      </div>

      <button
        onclick="cancelManualEntry()"
        style="
          width:58%;
          max-width:220px;
          background:#444;
          margin-top:34px;
        ">
        Cancel
      </button>
    </div>
  `;

  setScannerMessage("");

  setTimeout(() => {
    const input = document.getElementById("manualSerialInput");
    if(input) input.focus();
  }, 100);
}

async function handleManualSerialInput(){
  const input = document.getElementById("manualSerialInput");
  const message = document.getElementById("manualSerialMessage");

  if(!input) return;

  const typed = cleanScannedSerial(input.value);

  if(!typed){
    if(message) message.textContent = "Product will appear when only one match is found.";
    return;
  }

  const matches = Object.keys(lookupCache).filter(serial => {
    return serial.includes(typed);
  });

  if(matches.length === 1){
    const matchedSerial = matches[0];
    const matchedProduct = lookupCache[matchedSerial];

    pendingProduct = matchedProduct;
    pendingBarcode = matchedSerial;

  showPendingProductInReader(
    matchedProduct,
    matchedSerial,
    String(matchedProduct.submitted || "").trim() !== ""
  );

    setScannerMessage("");
    return;
  }

  if(message){
    if(matches.length === 0){
      message.textContent = "No matching products.";
    }else{
      message.textContent = matches.length + " possible matches. Keep typing.";
    }
  }
}

function showReaderMessage(text){
  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <div style="
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      box-sizing:border-box;
      padding-top:3px;
    ">
      <img src="haggertys-logo.png" class="reader-logo">

      <div style="
        flex:1;
        display:flex;
        align-items:center;
        justify-content:center;
        color:#aaa;
        font-size:40px;
        font-weight:bold;
        text-align:center;
        width:100%;
      ">
        ${text}
      </div>
    </div>
  `;
}

function showProductInReader(product){
  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <div style="
      width:100%;
      height:100%;
      padding:14px;
      box-sizing:border-box;
      text-align:center;
      display:flex;
      flex-direction:column;
    ">

      <div style="
        flex:1;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        padding-bottom:10px;
      ">
        <div style="font-size:18px;font-weight:bold;margin-bottom:12px;">
          ${product.productName}
        </div>

        <div style="display:flex;justify-content:center;gap:18px;font-size:16px;">
          <div>
            <span style="color:#aaa;">Serial:</span>
            <strong>${product.serial}</strong>
          </div>

          <div style="display:flex;flex-direction:column;align-items:center;">
            <div>
              <span style="color:#aaa;">Price:</span>
              <strong>${formatPrice(product.price)}</strong>
            </div>
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:center;">
        <button
          onclick="cancelProductSelection()"
          style="
            background:#444;
            width:58%;
            max-width:220px;
          ">
          Cancel
        </button>
      </div>
    </div>
  `;
}

function productNeedsCutout(product){
  const price = Number(String(product.price || "").replace(/[$,]/g, ""));
  return price >= 2999;
}

function updateCutoutOption(product){
  const cutoutCard = document.getElementById("cutoutCard");
  const cutoutBox = document.getElementById("cutout");

  if(!cutoutCard || !cutoutBox) return;

  if(product && productNeedsCutout(product)){
    cutoutCard.style.display = "flex";
  }else{
    cutoutCard.style.display = "none";
    cutoutBox.checked = false;
  }
}

function formatPrice(price){
  const num = Number(String(price || "").replace(/[$,]/g, ""));
  if(isNaN(num)) return price ? "$" + price : "";
  return "$" + num.toLocaleString("en-US");
}
  
function showPendingProductInReader(product, barcode, alreadySubmitted){
  const overlay = document.getElementById("confirmOverlay");
  const box = document.getElementById("confirmBox");

  box.innerHTML = `
    <div style="font-size:20px;font-weight:bold;text-decoration:underline;margin-bottom:14px;color:${alreadySubmitted ? '#ff6666' : 'white'};">
      ${alreadySubmitted ? 'Already Submitted' : 'Confirm Product'}
    </div>

    <div style="font-size:18px;font-weight:bold;margin-bottom:12px;">
      ${product.productName}
    </div>

    <div style="display:flex;justify-content:center;gap:18px;font-size:16px;margin-bottom:14px;">
      <div>
        <span style="color:#aaa;">Serial:</span>
        <strong>${product.serial}</strong>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;">
        <div>
          <span style="color:#aaa;">Price:</span>
          <strong>${formatPrice(product.price)}</strong>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:12px;">
      <button onclick="acceptPendingProduct()">OK</button>
      <button onclick="rejectPendingProduct()" style="background:#444;">
        ${productEntryMode === "manual" ? "Re-Enter" : "Re-Scan"}
      </button>
    </div>
  `;

  overlay.style.display = "flex";
}

function acceptPendingProduct(){
  document.getElementById("confirmOverlay").style.display = "none";

  if(!pendingProduct){
    setScannerMessage("No pending product.");
    return;
  }
  
  currentProduct = pendingProduct;

  updateCutoutOption(currentProduct);

  showScannerBox();
  hideProductCard();
  showProductInReader(currentProduct);
  setScannerMessage("");

  pendingProduct = null;
  pendingBarcode = "";
}

async function rejectPendingProduct(){
  document.getElementById("confirmOverlay").style.display = "none";

  pendingProduct = null;
  pendingBarcode = "";

  await stopScanner();

  if(productEntryMode === "manual"){
    showManualSerialEntry();
  }else{
    startScanner();
  }
}

function hideScanProductButton(){
  const button = document.getElementById("scanProductButton");

  if(button){
    button.style.display = "none";
  }
}

function cleanScannedSerial(serial){
  let cleaned = String(serial || "")
    .trim()
    .replace(/\*/g, "")
    .replace(/\s+/g, "")
    .toLowerCase();

  if(cleaned.startsWith("m")){
    cleaned = cleaned.substring(1);
  }

  return cleaned;
}

async function stopScanner(){
  scanLoopActive = false;

  if(videoStream){

  try{
  await setTorch(false);
  }catch(e){}

  videoStream.getTracks().forEach(track => track.stop());
}

  videoStream = null;
  zxingReader = null;
  scanner = null;
  scannerRunning = false;
}

async function cancelScan(){
  await stopScanner();
  resetFormOnly();
  showScannerBox();
  showScanProductButton();
  setScannerMessage("");
}

async function setTorch(enabled){
  try{
    if(!videoStream) return;

    const track = videoStream.getVideoTracks()[0];

    if(!track) return;

    const capabilities = track.getCapabilities();

    if(!capabilities.torch) return;

    await track.applyConstraints({
      advanced: [{ torch: enabled }]
    });

  }catch(err){
    console.log("Torch error:", err);
  }
}

async function optimizeCameraForBarcode(){
  try{
    if(!videoStream) return;

    const track = videoStream.getVideoTracks()[0];
    if(!track || !track.getCapabilities) return;

    const capabilities = track.getCapabilities();
    const advanced = [];

    if(capabilities.focusMode && capabilities.focusMode.includes("continuous")){
      advanced.push({ focusMode: "continuous" });
    }

    if(capabilities.zoom){
      const zoom = Math.min(
        capabilities.zoom.max,
        Math.max(capabilities.zoom.min, 2)
      );

      advanced.push({ zoom: zoom });
    }

    if(capabilities.exposureMode && capabilities.exposureMode.includes("continuous")){
      advanced.push({ exposureMode: "continuous" });
    }

    if(advanced.length){
      await track.applyConstraints({ advanced: advanced });
    }

  }catch(err){
    console.log("Camera optimization error:", err);
  }
}

async function startScanner(){
  showReaderMessage("");
  setScannerMessage("Opening camera...");
  showScannerBox();
  hideProductCard();
  hideScanProductButton();

  await stopScanner();

  detectedBarcodes.clear();
  barcodeProcessing = false;
  pendingProduct = null;
  pendingBarcode = "";
  candidateBarcode = "";
  candidateCount = 0;
  scanLoopActive = true;
  productEntryMode = "scan";

  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <video id="video" autoplay playsinline></video>
    <canvas id="scanCanvas" style="display:none;"></canvas>
  `;

  const video = document.getElementById("video");
  const canvas = document.getElementById("scanCanvas");

  try{
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30 }
      },
      audio: false
    });

    video.srcObject = videoStream;

    await video.play();

    await setTorch(true);
    await optimizeCameraForBarcode();

    scannerRunning = true;
    showCancelScanButton();
    
    zxingReader = new ZXingBrowser.BrowserMultiFormatReader(undefined, {
      delayBetweenScanAttempts: 0
    });

    setScannerMessage("Point serial barcode inside the scan window");

    scanCroppedFrame(video, canvas);

  }catch(err){
    scannerRunning = false;
    setScannerMessage("Camera error. Tap Re-Scan or refresh the page.");
    setMessage("Camera error: " + err.message);
  }
}

async function scanCroppedFrame(video, canvas){
  if(!scanLoopActive || barcodeProcessing){
    return;
  }

  if(video.readyState < 2){
    requestAnimationFrame(() => scanCroppedFrame(video, canvas));
    return;
  }

  const sourceWidth = video.videoWidth;
  const sourceHeight = video.videoHeight;

  const cropWidth = Math.floor(sourceWidth * 0.90);
  const cropHeight = Math.floor(sourceHeight * 0.45);

  const cropX = Math.floor((sourceWidth - cropWidth) / 2);
  const cropY = Math.floor((sourceHeight - cropHeight) / 2);

  canvas.width = cropWidth;
  canvas.height = cropHeight;

  const ctx = canvas.getContext("2d");

  ctx.drawImage(
    video,
    cropX,
    cropY,
    cropWidth,
    cropHeight,
    0,
    0,
    cropWidth,
    cropHeight
  );

try{
  const result = await zxingReader.decodeFromCanvas(canvas);
  const cleaned = cleanScannedSerial(result.getText());

  if(!lookupCache[cleaned]){
  throw new Error("No matching product");
}

  barcodeProcessing = true;

const matchedProduct = lookupCache[cleaned];

await stopScanner();

pendingProduct = matchedProduct;
pendingBarcode = cleaned;

showPendingProductInReader(
  matchedProduct,
  cleaned,
  String(matchedProduct.submitted || "").trim() !== ""
);
  setScannerMessage("Confirm product or Re-Scan.");
  return;

}catch(e){}

setTimeout(() => {
  scanCroppedFrame(video, canvas);
}, 40);
}
  
function resetFormOnly(){
  currentProduct = null;

  hideProductCard();

  document.getElementById("hasCase").checked = false;
  document.getElementById("socials").checked = false;
  updateCutoutOption(null);
  document.getElementById("derekOffice").checked = false;
  document.getElementById("notes").value = "";

  document.getElementById("productName").textContent = "";
  document.getElementById("serialDisplay").textContent = "";
  document.getElementById("price").textContent = "";

  showReaderMessage("");
}

async function resetAndStartScanner(){
  await stopScanner();
  resetFormOnly();
  startScanner();
}

function apiRequest(payload){
  return new Promise((resolve, reject) => {
    const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

    window[callbackName] = function(data){
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    const params = new URLSearchParams();

    Object.keys(payload).forEach(key => {
      params.append(key, payload[key]);
    });

    params.append("callback", callbackName);

    const script = document.createElement("script");
    script.src = APPS_SCRIPT_URL + "?" + params.toString();

    script.onerror = function(){
      delete window[callbackName];
      script.remove();
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}

async function lookupProduct(serial){
  serial = cleanScannedSerial(serial);

  if(!lookupLoaded){
    setMessage("Product list still loading. Trying lookup...");
    await loadLookupData();
  }

  const product = lookupCache[serial];

  if(!product){
    currentProduct = null;
    hideProductCard();
    showScannerBox();
    setMessage("Product not found for scanned serial: " + serial);

    setTimeout(() => {
      startScanner();
    }, 2000);

    return;
  }

  currentProduct = product;

    showScannerBox();
    hideProductCard();
    showProductInReader(product);
    setScannerMessage("");
  }

async function submitProduct(){
  if(!currentProduct){
    setMessage("Scan a product first.");
    return;
  }

  const photographer = document.getElementById("photographer").value;

  if(!photographer){
    setScannerMessage("Select photographer.");
    return;
  }

  const payload = {
    action:"submit",
    photographer:photographer,
    serial:currentProduct.serial,
    productName:currentProduct.productName,
    price:currentProduct.price,
    hasCase:document.getElementById("hasCase").checked,
    socials:document.getElementById("socials").checked,
    notes:document.getElementById("notes").value,
    derekOffice:document.getElementById("derekOffice").checked,
    cutout:document.getElementById("cutout").checked
  };

  const overlay = document.getElementById("statusOverlay");
  const statusBox = document.getElementById("statusBox");

  const submitButton = document.getElementById("submitButton");
  submitButton.disabled = true;
  submitButton.style.background = "#777";
  submitButton.style.opacity = "0.5";

  showReaderMessage("");
  let dots = 0;

  statusBox.textContent = "Submitting";

  submittingAnimation = setInterval(() => {
    dots = (dots + 1) % 4;
    statusBox.textContent = "Submitting" + ".".repeat(dots);
  }, 300);
  overlay.style.display = "flex";

  try{
    const result = await apiRequest(payload);

    if(!result.success){

      if(submittingAnimation){
        clearInterval(submittingAnimation);
        submittingAnimation = null;
      }

      overlay.style.display = "none";

      submitButton.disabled = false;
      submitButton.style.background = "#1a73e8";
      submitButton.style.opacity = "1";

      setMessage(result.message || "Submit failed.");
      return;
    }

    if(submittingAnimation){
      clearInterval(submittingAnimation);
      submittingAnimation = null;
    }

    statusBox.textContent = "Submitted\nSuccessfully";

  const normalizedSerial = cleanScannedSerial(currentProduct.serial);

  if(lookupCache[normalizedSerial]){
  lookupCache[normalizedSerial].submitted = "Submitted";
  }

setTimeout(() => {
  overlay.style.display = "none";
  resetFormOnly();
  hideProductCard();
  showScannerBox();
  showScanProductButton();
  setScannerMessage("");
  submitButton.disabled = false;
  submitButton.style.background = "#1a73e8";
  submitButton.style.opacity = "1";
}, 3000);

  }catch(err){
    if(submittingAnimation){

      submittingAnimation = null;
    }
    overlay.style.display = "none";
    setMessage("Submit failed: " + err.message);
    submitButton.disabled = false;
    submitButton.style.background = "#1a73e8";
    submitButton.style.opacity = "1";
  }
}

async function loadLookupData(){
  try{
    const data = await apiRequest({
      action:"lookupData"
    });

    if(data.success && data.products){
      if(loadingAnimation){
        clearInterval(loadingAnimation);
        loadingAnimation = null;
      }
      lookupCache = data.products;
      lookupLoaded = true;
      showReaderMessage("");
    }else{
      if(loadingAnimation){
        clearInterval(loadingAnimation);
        loadingAnimation = null;
      }
      lookupLoaded = false;
      setMessage(data.message || "Could not load product list.");
    }
  }catch(err){
    if(loadingAnimation){
      clearInterval(loadingAnimation);
      loadingAnimation = null;
    }
    lookupLoaded = false;
    setMessage("Lookup data failed to load: " + err.message);
  }
}
