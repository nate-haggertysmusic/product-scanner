<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
  padding:16px;
  margin:0;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

button{
  width:100%;
  border:none;
  border-radius:10px;
  padding:12px;
  font-size:18px;
  font-weight:bold;
  background:#1a73e8;
  color:white;
}

#scannerBox{
  margin-top:20px;
}

#scannerMessage{
  text-align:center;
  color:#aaa;
  margin-top:12px;
  font-size:16px;
}

.card{
  background:#222;
  border-radius:12px;
  padding:16px;
  margin-top:20px;
  display:none;
}

.info-label{
  color:#aaa;
  font-size:14px;
  margin-top:10px;
}

.info-value{
  font-size:22px;
  font-weight:bold;
}

#serialDisplay,
#price{
  font-size:20px;
}

label{
  display:block;
  margin-top:10px;
  font-weight:bold;
}

select,
input,
textarea{
  width:100%;
  margin-top:6px;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:16px;
  box-sizing:border-box;
}

.checkbox-row{
  display:flex;
  gap:14px;
  margin-top:18px;
}

.checkbox-card{
  flex:1;
  background:#222;
  border-radius:10px;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:16px;
}

.checkbox-card input{
  width:20px;
  height:20px;
}

#message{
  margin-top:20px;
  text-align:center;
  font-size:18px;
  color:#9fd0ff;
  font-weight:bold;
  white-space:pre-wrap;
}

.submit-button{
  margin-top:26px;
  margin-bottom:40px;
}

.rescan-button{
  margin-top:20px;
  background:#444;
}

#scanProductButton{
  width:90%;
  max-width:360px;
}

.cancel-scan-button{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  background:#444;
  z-index:100;
}

#statusOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#statusBox{
  background:#222;
  color:white;
  border-radius:18px;
  padding:28px 34px;
  font-size:26px;
  font-weight:bold;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

#reader{
  width:100%;
  height:180px;
  overflow:hidden;
  border-radius:12px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}

#reader video{
  width:100% !important;
  height:100% !important;
  object-fit:cover !important;
  border-radius:12px;
}

#reader__scan_region{
  display:flex !important;
  align-items:center;
  justify-content:center;
}

#reader img{
  display:none !important;
}

</style>
</head>

<body>

<h1>Product Scanner</h1>

<div id="scannerBox">
  <div id="reader">
    <button id="scanProductButton" onclick="resetAndStartScanner()">
      Scan Product
    </button>
  </div>
  <div id="scannerMessage">Tap Scan Product when ready.</div>
</div>

<div class="card" id="productCard">
  <div class="info-label">Product</div>
  <div class="info-value" id="productName"></div>

  <div class="info-label">Serial Number</div>
  <div id="serialDisplay"></div>

  <div class="info-label">Price</div>
  <div id="price"></div>

  <button class="rescan-button" onclick="resetAndStartScanner()">
    Re-Scan
  </button>
</div>

<label>Photographer</label>
<select id="photographer">
  <option value="">Select Photographer</option>
  <option value="Nate">Nate</option>
  <option value="Amber">Amber</option>
  <option value="Taylor">Taylor</option>
  <option value="Mia">Mia</option>
  <option value="Saylor">Saylor</option>
</select>

<div class="checkbox-row">
  <label class="checkbox-card">
    <input type="checkbox" id="hasCase">
    Case
  </label>

  <label class="checkbox-card">
    <input type="checkbox" id="socials">
    Socials
  </label>
</div>

<label>Notes / Damage</label>
<input id="notes" type="text" placeholder="Damage notes, missing parts, etc.">

<label class="checkbox-card" style="margin-top:20px;">
  <input type="checkbox" id="derekOffice" onchange="handleDerekOffice()">
  In Derek's office, no photos taken
</label>

<button class="submit-button" onclick="submitProduct()">
Submit
</button>

<div id="statusOverlay">
  <div id="statusBox">Submitting...</div>
</div>

<script>
const APPS_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbx9_ZUXtHrmXSWH3ih4fifT3MY0eYsFkLHVjQOVl0uCKM2AWgBaIfYymMJ4PRfQE5ZQ/exec";

let candidateBarcode = "";
let candidateCount = 0;
let scanner = null;
let scannerRunning = false;
let videoStream = null;
let zxingReader = null;
let scanLoopActive = false;
let currentProduct = null;
let lookupCache = {};
let lookupLoaded = false;
let detectedBarcodes = new Set();
let barcodeProcessing = false;

function setMessage(text){
  showReaderMessage(text);
}

function setScannerMessage(text){
  document.getElementById("scannerMessage").textContent = text;
}

function showScannerBox(){
  document.getElementById("scannerBox").style.display = "block";
}

function hideScannerBox(){
  document.getElementById("scannerBox").style.display = "none";
}

function showProductCard(){
  document.getElementById("productCard").style.display = "block";
}

function hideProductCard(){
  document.getElementById("productCard").style.display = "none";
}

function showScanProductButton(){
  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <button id="scanProductButton" onclick="resetAndStartScanner()">
      Scan Product
    </button>
  `;
}

function showCancelScanButton(){
  const reader = document.getElementById("reader");

  const cancelButton = document.createElement("button");
  cancelButton.textContent = "Cancel Scan";
  cancelButton.className = "cancel-scan-button";
  cancelButton.onclick = cancelScan;

  reader.style.position = "relative";
  reader.appendChild(cancelButton);
}

function showReaderMessage(text){
  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <div style="color:#aaa;font-size:20px;font-weight:bold;text-align:center;padding:20px;">
      ${text}
    </div>
  `;
}

function showProductInReader(product){
  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <div style="width:100%;padding:14px;box-sizing:border-box;text-align:center;">
      <div style="font-size:18px;font-weight:bold;margin-bottom:12px;">
        ${product.productName}
      </div>

      <div style="display:flex;justify-content:center;gap:18px;font-size:16px;">
        <div>
          <span style="color:#aaa;">Serial:</span>
          <strong>${product.serial}</strong>
        </div>

        <div>
          <span style="color:#aaa;">Price:</span>
          <strong>${product.price ? "$" + product.price : ""}</strong>
        </div>
      </div>
    </div>
  `;
}

function hideScanProductButton(){
  const button = document.getElementById("scanProductButton");

  if(button){
    button.style.display = "none";
  }
}

function cleanScannedSerial(serial){
  let cleaned = String(serial || "")
    .trim()
    .replace(/\*/g, "")
    .replace(/\s+/g, "")
    .toLowerCase();

  if(cleaned.startsWith("m")){
    cleaned = cleaned.substring(1);
  }

  return cleaned;
}

async function stopScanner(){
  scanLoopActive = false;

  if(videoStream){
    videoStream.getTracks().forEach(track => track.stop());
  }

  videoStream = null;
  zxingReader = null;
  scanner = null;
  scannerRunning = false;
}

async function cancelScan(){
  await stopScanner();
  resetFormOnly();
  showScannerBox();
  showScanProductButton();
  setScannerMessage("Tap Scan Product when ready.");
}

async function startScanner(){
  showReaderMessage("");
  setScannerMessage("Opening camera...");
  showScannerBox();
  hideProductCard();
  hideScanProductButton();

  await stopScanner();

  detectedBarcodes.clear();
  barcodeProcessing = false;
  candidateBarcode = "";
  candidateCount = 0;
  scanLoopActive = true;

  const reader = document.getElementById("reader");

  reader.innerHTML = `
    <video id="video" autoplay playsinline></video>
    <canvas id="scanCanvas" style="display:none;"></canvas>
  `;

  const video = document.getElementById("video");
  const canvas = document.getElementById("scanCanvas");

  try{
    videoStream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:"environment"
      },
      audio:false
    });

    video.srcObject = videoStream;

    await video.play();

    scannerRunning = true;
    showCancelScanButton();

    zxingReader = new ZXingBrowser.BrowserMultiFormatReader();

    setScannerMessage("Point serial barcode inside the scan window");

    scanCroppedFrame(video, canvas);

  }catch(err){
    scannerRunning = false;
    setScannerMessage("Camera error. Tap Re-Scan or refresh the page.");
    setMessage("Camera error: " + err.message);
  }
}

async function scanCroppedFrame(video, canvas){
  if(!scanLoopActive || barcodeProcessing){
    return;
  }

  if(video.readyState < 2){
    requestAnimationFrame(() => scanCroppedFrame(video, canvas));
    return;
  }

  const sourceWidth = video.videoWidth;
  const sourceHeight = video.videoHeight;

  const cropWidth = Math.floor(sourceWidth * 0.90);
  const cropHeight = Math.floor(sourceHeight * 0.22);

  const cropX = Math.floor((sourceWidth - cropWidth) / 2);
  const cropY = Math.floor((sourceHeight - cropHeight) / 2);

  canvas.width = cropWidth;
  canvas.height = cropHeight;

  const ctx = canvas.getContext("2d");

  ctx.drawImage(
    video,
    cropX,
    cropY,
    cropWidth,
    cropHeight,
    0,
    0,
    cropWidth,
    cropHeight
  );

try{
  const result = await zxingReader.decodeFromCanvas(canvas);
  const cleaned = cleanScannedSerial(result.getText());

  setScannerMessage("Detected: " + cleaned);

  if(!lookupCache[cleaned]){
    return;
  }

  barcodeProcessing = true;
  await stopScanner();

  document.getElementById("reader").innerHTML = "";
  setScannerMessage("Barcode matched.");
  lookupProduct(cleaned);
  return;

}catch(e){}

setTimeout(() => {
  scanCroppedFrame(video, canvas);
}, 120);
}
  
function resetFormOnly(){
  currentProduct = null;

  hideProductCard();

  document.getElementById("hasCase").checked = false;
  document.getElementById("socials").checked = false;
  document.getElementById("derekOffice").checked = false;
  document.getElementById("notes").value = "";

  document.getElementById("productName").textContent = "";
  document.getElementById("serialDisplay").textContent = "";
  document.getElementById("price").textContent = "";

  showReaderMessage("");
}

async function resetAndStartScanner(){
  await stopScanner();
  resetFormOnly();
  startScanner();
}

function apiRequest(payload){
  return new Promise((resolve, reject) => {
    const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

    window[callbackName] = function(data){
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    const params = new URLSearchParams();

    Object.keys(payload).forEach(key => {
      params.append(key, payload[key]);
    });

    params.append("callback", callbackName);

    const script = document.createElement("script");
    script.src = APPS_SCRIPT_URL + "?" + params.toString();

    script.onerror = function(){
      delete window[callbackName];
      script.remove();
      reject(new Error("JSONP request failed"));
    };

    document.body.appendChild(script);
  });
}

async function lookupProduct(serial){
  serial = cleanScannedSerial(serial);

  if(!lookupLoaded){
    setMessage("Product list still loading. Trying lookup...");
    await loadLookupData();
  }

  const product = lookupCache[serial];

  if(!product){
    currentProduct = null;
    hideProductCard();
    showScannerBox();
    setMessage("Product not found for scanned serial: " + serial);

    setTimeout(() => {
      startScanner();
    }, 2000);

    return;
  }

  currentProduct = product;

    showScannerBox();
    hideProductCard();
    showProductInReader(product);
    setScannerMessage("Review product info, then Submit or Re-Scan.");
  }

function handleDerekOffice(){
  const checked = document.getElementById("derekOffice").checked;
  const notes = document.getElementById("notes");
  const text = "In Derek's office, no photos taken";

  if(checked && !notes.value.includes(text)){
    notes.value = notes.value.trim()
      ? notes.value + "\n" + text
      : text;
  }
}

async function submitProduct(){
  if(!currentProduct){
    setMessage("Scan a product first.");
    return;
  }

  const photographer = document.getElementById("photographer").value;

  if(!photographer){
    setMessage("Select photographer.");
    return;
  }

  const payload = {
    action:"submit",
    photographer:photographer,
    serial:currentProduct.serial,
    productName:currentProduct.productName,
    price:currentProduct.price,
    hasCase:document.getElementById("hasCase").checked,
    socials:document.getElementById("socials").checked,
    notes:document.getElementById("notes").value,
    derekOffice:document.getElementById("derekOffice").checked
  };

  const overlay = document.getElementById("statusOverlay");
  const statusBox = document.getElementById("statusBox");

  showReaderMessage("");
  statusBox.textContent = "Submitting...";
  overlay.style.display = "flex";

  try{
    const result = await apiRequest(payload);

    if(!result.success){
      overlay.style.display = "none";
      setMessage(result.message || "Submit failed.");
      return;
    }

    statusBox.textContent = "Submitted Successfully";

setTimeout(() => {
  overlay.style.display = "none";
  resetFormOnly();
  hideProductCard();
  showScannerBox();
  showScanProductButton();
  setScannerMessage("Tap Scan Product when ready.");
}, 3000);

  }catch(err){
    overlay.style.display = "none";
    setMessage("Submit failed: " + err.message);
  }
}

async function loadLookupData(){
  setMessage("Loading Product List...");

  try{
    const data = await apiRequest({
      action:"lookupData"
    });

    if(data.success && data.products){
      lookupCache = data.products;
      lookupLoaded = true;
      showReaderMessage("");
    }else{
      lookupLoaded = false;
      setMessage(data.message || "Could not load product list.");
    }
  }catch(err){
    lookupLoaded = false;
    setMessage("Lookup data failed to load: " + err.message);
  }
}

window.addEventListener("load", async () => {
  showScannerBox();
  hideProductCard();
  showReaderMessage("Loading Product List...");
  setScannerMessage("");
  await loadLookupData();
  showScanProductButton();
  setScannerMessage("Tap Scan Product when ready.");
});
</script>

</body>
</html>
